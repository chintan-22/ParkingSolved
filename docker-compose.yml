version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: parking_postgres
    environment:
      POSTGRES_USER: parking_user
      POSTGRES_PASSWORD: parking_pass
      POSTGRES_DB: parking_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking_user -d parking_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parking_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: parking_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parking_network

  # MQTT Broker (HiveMQ Community Edition)
  mqtt:
    image: hivemq/hivemq4:latest
    container_name: parking_mqtt
    ports:
      - "1883:1883"
      - "8080:8080"
    environment:
      HIVEMQ_USER: parking_user
      HIVEMQ_PASSWORD: parking_pass
    volumes:
      - mqtt_data:/opt/hivemq/data
      - ./mqtt-config.xml:/opt/hivemq/conf/config.xml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parking_network

  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parking_api
    environment:
      DATABASE_URL: postgresql://parking_user:parking_pass@postgres:5432/parking_db
      REDIS_URL: redis://redis:6379
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - parking_network

  # Simulator (generates realistic occupancy patterns)
  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: parking_simulator
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    volumes:
      - ./simulator:/app
    command: python simulator.py
    networks:
      - parking_network

  # MQTT Ingestion Service (processes sensor events)
  ingestion:
    build:
      context: ./sensor-ingestion
      dockerfile: Dockerfile
    container_name: parking_ingestion
    environment:
      MQTT_BROKER: mqtt
      MQTT_PORT: 1883
      MQTT_USER: parking_user
      MQTT_PASSWORD: parking_pass
      API_BASE_URL: http://api:8000
    depends_on:
      - mqtt
      - api
    volumes:
      - ./sensor-ingestion:/app
    command: python mqtt_ingestion.py
    networks:
      - parking_network

  # Frontend (simple HTTP server)
  web:
    image: nginx:alpine
    container_name: parking_web
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - parking_network

networks:
  parking_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mqtt_data:
